  .header-right { text-align: right; font-size: 12px; color: #2B3990; font-weight: 500; line-height: 1.5; }

    position: fixed; bottom: 28px; left: 28px; z-index: 1000;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
    border-radius: 16px; padding: 18px 22px;

  #legend h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px;
    color: #2B3990; margin-bottom: 14px; font-weight: 700;
  }
  .legend-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; font-size: 12px; color: #333;
    cursor: pointer; transition: opacity 0.2s; font-weight: 500;
  }
  .legend-row:hover { opacity: 0.7; }
  .legend-row.dimmed { opacity: 0.3; }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);

  .legend-count {

// ─── CUSTOM PANES (z-index ordering) ───

}).addTo(map);

// ─── OVERPASS API — custom-coloured map features ───
const BBOX = '51.9195,4.4815,51.9325,4.4960';

const OVERPASS_QUERY = `
[out:json][timeout:25];
(
  way["natural"="water"](${BBOX});
  relation["natural"="water"](${BBOX});
  way["waterway"~"river|canal|stream"](${BBOX});
  way["landuse"~"grass|park|meadow|garden|recreation_ground"](${BBOX});
  way["leisure"~"park|garden|pitch|playground"](${BBOX});
  way["natural"~"wood|scrub|heath|grassland"](${BBOX});
  way["building"](${BBOX});
  way["highway"~"motorway|trunk|primary|secondary|tertiary|unclassified|residential|service|footway|path|cycleway|pedestrian|living_street"](${BBOX});
);
out body; >; out skel qt;
`;

function osmToGeoJSON(data) {
  const nodes = {};
  data.elements.forEach(el => { if (el.type === 'node') nodes[el.id] = [el.lon, el.lat]; });

  const features = [];
  data.elements.forEach(el => {
    if (el.type !== 'way') return;
    const coords = (el.nodes || []).map(id => nodes[id]).filter(Boolean);
    if (coords.length < 2) return;
    const tags = el.tags || {};
    const isClosed = coords.length > 2 && coords[0] && coords[coords.length-1] &&
                     coords[0][0] === coords[coords.length-1][0] &&
                     coords[0][1] === coords[coords.length-1][1];
    const geomType = (isClosed && !tags.highway) ? 'Polygon' : 'LineString';
    features.push({
      type: 'Feature',
      properties: tags,
      geometry: {
        type: geomType,
        coordinates: geomType === 'Polygon' ? [coords] : coords,
      }
    });
  });
  return { type: 'FeatureCollection', features };
}

function roadWeight(highway) {
  if (['motorway','trunk','primary'].includes(highway))       return 5;
  if (['secondary','tertiary'].includes(highway))             return 4;
  if (['unclassified','residential','living_street'].includes(highway)) return 3;
  if (['service','pedestrian'].includes(highway))             return 2;
  return 1.5;
}

fetch('https://overpass-api.de/api/interpreter', {
  method: 'POST',
  body: 'data=' + encodeURIComponent(OVERPASS_QUERY),
})
.then(r => r.json())
.then(data => {
  const geojson = osmToGeoJSON(data);

  // 1. Water polygons & rivers
  L.geoJSON(geojson, {
    pane: 'featuresPane',
    filter: f => {
      const t = f.properties;
      return t.natural === 'water' || ['river','canal','stream'].includes(t.waterway);
    },
    style: f => {
      const t = f.properties;
      if (f.geometry.type === 'LineString') {
        return { color: '#aad3df', weight: t.waterway === 'river' ? 5 : 3, opacity: 1 };
      }
      return { fillColor: '#aad3df', fillOpacity: 1, color: '#9ac8d8', weight: 0.5, stroke: true };
    }
  }).addTo(map);

  // 2. Green areas
  L.geoJSON(geojson, {
    pane: 'featuresPane',
    filter: f => {
      const t = f.properties;
      return ['grass','park','meadow','garden','recreation_ground'].includes(t.landuse) ||
             ['park','garden','pitch','playground'].includes(t.leisure) ||
             ['wood','scrub','heath','grassland'].includes(t.natural);
    },
    style: () => ({ fillColor: '#b8ddb0', fillOpacity: 1, color: '#a8cd9f', weight: 0.5, stroke: true })
  }).addTo(map);

  // 3. Buildings (grey)
  L.geoJSON(geojson, {
    pane: 'featuresPane',
    filter: f => !!f.properties.building,
    style: () => ({ fillColor: '#c8c4bc', fillOpacity: 1, color: '#b0aca4', weight: 0.5, stroke: true })
  }).addTo(map);

  // 4. Roads (white)
  L.geoJSON(geojson, {
    pane: 'roadsPane',
    filter: f => !!f.properties.highway,
    style: f => ({
      color: '#ffffff',
      weight: roadWeight(f.properties.highway),
      opacity: 1,
      lineCap: 'round',
      lineJoin: 'round',
    })
  }).addTo(map);
})
.catch(err => {
  console.warn('Overpass API failed, falling back to CartoDB tiles:', err);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 20, subdomains: 'abcd'
  }).addTo(map);
});

  const marker = L.circleMarker([org.lat, org.lng], {
    radius: 6,
    fillColor: cat.color,
    fillOpacity: 0.85,
    color: '#fff',
    weight: 1.5,
    opacity: 0.9,
  });

  marker.bindPopup(`
    <div class="popup-cat" style="color:${cat.color}">${cat.label}</div>
    <div class="popup-name">${org.n}</div>
    <div class="popup-desc">${org.d}</div>
  `, { closeButton: false, offset: [0, -4] });

  marker.on('mouseover', function() { this.openPopup(); this.setStyle({ radius: 9, weight: 2.5 }); });
  marker.on('mouseout', function() { this.closePopup(); this.setStyle({ radius: 6, weight: 1.5 }); });

  layerGroups[org.c].addLayer(marker);
});

  row.innerHTML = `
    <div class="legend-dot" style="background:${categories[cat].color}"></div>
    <span>${categories[cat].label}</span>
    <span class="legend-count">${counts[cat]}</span>
  `;
  row.addEventListener('click', () => {
    activeFilters[cat] = !activeFilters[cat];
    if (activeFilters[cat]) {
      layerGroups[cat].addTo(map);
      row.classList.remove('dimmed');
    } else {
      map.removeLayer(layerGroups[cat]);
      row.classList.add('dimmed');
    }
    // Update count
    let total = 0;
    Object.keys(activeFilters).forEach(c => { if (activeFilters[c]) total += counts[c]; });
    document.getElementById('total-count').textContent = total;
  });
  legendEl.appendChild(row);
});
</script>
</body>
</html>
